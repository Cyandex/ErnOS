services:
  - type: web
    name: ernos
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: ERNOS_STATE_DIR
        value: /data/.ernos
      - key: ERNOS_WORKSPACE_DIR
        value: /data/workspace
      - key: ERNOS_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: ernos-data
      mountPath: /data
      sizeGB: 1
