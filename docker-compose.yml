services:
  ernos-gateway:
    image: ${ERNOS_IMAGE:-ernos:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ERNOS_GATEWAY_TOKEN: ${ERNOS_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${ERNOS_CONFIG_DIR}:/home/node/.ernos
      - ${ERNOS_WORKSPACE_DIR}:/home/node/.ernos/workspace
    ports:
      - "${ERNOS_GATEWAY_PORT:-18789}:18789"
      - "${ERNOS_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${ERNOS_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  ernos-cli:
    image: ${ERNOS_IMAGE:-ernos:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ERNOS_GATEWAY_TOKEN: ${ERNOS_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${ERNOS_CONFIG_DIR}:/home/node/.ernos
      - ${ERNOS_WORKSPACE_DIR}:/home/node/.ernos/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
